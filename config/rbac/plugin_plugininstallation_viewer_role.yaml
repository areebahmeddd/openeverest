# This rule is not used by the project openeverest itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to plugin.openeverest.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openeverest
    app.kubernetes.io/managed-by: kustomize
  name: plugin-plugininstallation-viewer-role
rules:
- apiGroups:
  - plugin.openeverest.io
  resources:
  - plugininstallations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - plugin.openeverest.io
  resources:
  - plugininstallations/status
  verbs:
  - get
