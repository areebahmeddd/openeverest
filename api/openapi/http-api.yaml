openapi: 3.0.2
servers:
  - url: /v1
info:
  version: 1.0.0
  title: OpenEverest schema
  description: |
    # Authentication
    All requests to Everest API require `Authorization: Bearer <token>` header with a valid token in plain-text.
    
    The token can be obtained by using `everestctl token reset` which resets the token and prints it to the screen.
tags:
  - name: Kubernetes
    description: Everything related to the Kubernetes Clusters
  - name: General info
    description: General information about the Everest installation
  - name: Authentication & Authorization
    description: Everything related to authentication and authorization
  - name: Provider
    description: Everything related to providers
  - name: Instance
    description: Everything related to instances
  - name: Backup
    description: Everything related to backups
  - name: Restore
    description: Everything related to restores
  - name: Backup Storage
    description: Everything related to backup storage
  - name: Monitoring
    description: Everything related to monitoring
security:
  - BearerAuth: []
paths:
  '/session':
    post:
      tags:
        - Authentication & Authorization
      security: []
      summary: Everest API Login
      description: |
        This API issues a new JWT token for logging in from the Everest API.
        The provided user must have the `login` capability.
      operationId: createSession
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        description: The user credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentials'
    delete:
      tags:
        - Authentication & Authorization
      summary: Everest API Logout
      description: |
        This API invalidates Everest API JWT token.
      operationId: deleteSession
      responses:
        '204':
          description: Successful operation
        '429':
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/permissions':
    get:
      tags:
        - Authentication & Authorization
      summary: Get user permissions
      description: |
        This API returns a list of permissions for the user that is currently logged in.
        
        *Example:*
        Assume the following RBAC policy, and users `alice` and `bob`:
        ```
        p, role:dev, namespaces, read, *
        p, role:dev, database-engines, *, */*
        p, role:dev, database-clusters, *, */*
        p, bob, database-clusters, *, */*
        g, alice, role:dev
        ```
        The API will return the following permissions for `alice`:
        ```
        {
          "permissions": [
            [
                "alice",
                "namespaces",
                "read",
                "*"
            ],
            [
                "alice",
                "database-engines",
                "*",
                "*/*"
            ],
            [
                "alice",
                "database-clusters",
                "*",
                "*/*"
            ]
          ]
        }
        ```
        And the following permissions for `bob`:
        ```
        {
          "permissions": [
            [
                "bob",
                "database-clusters",
                "*",
                "*/*"
            ]
          ]
        }
        ```
      operationId: getUserPermissions
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPermissions'
        '400':
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/version':
    get:
      tags:
        - General info
      summary: Version
      description: |
        This API returns the version of the Everest API server.
      operationId: versionInfo
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
  '/settings':
    get:
      tags:
        - General info
      security: []
      summary: Settings
      description: This API returns the settings of the Everest installation.
      operationId: getSettings
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
  '/resources':
    get:
      tags:
        - Kubernetes
      summary: Cluster resources
      description: |
        This API gets the capacity and available resources of the Kubernetes cluster.
      operationId: getKubernetesClusterResources
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesClusterResources'
        '400':
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/cluster-info':
    get:
      tags:
        - Kubernetes
      summary: Cluster info
      description: |
        This API gets the cluster type and the storage classes available in the cluster.
      operationId: getKubernetesClusterInfo
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesClusterInfo'
        '400':
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters':
    x-everest-resource-name: clusters
    get:
      tags:
        - Kubernetes
      summary: List clusters
      description: List all clusters stored in Everest.
      operationId: listClusters
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterList'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{name}':
    x-everest-resource-name: clusters
    get:
      tags:
        - Kubernetes
      summary: Get cluster
      description: Get a cluster by name.
      operationId: getCluster
      parameters:
        - name: name
          in: path
          description: Name of the cluster
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '404':
          description: Cluster not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces':
    x-everest-resource-name: namespaces
    get:
      tags:
        - General info
      summary: Managed namespaces
      description: |
        This API returns a list of namespaces managed by Everest.
      operationId: listNamespaces
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceList'
  '/clusters/{cluster}/providers':
    x-everest-resource-name: providers
    get:
      tags:
        - Provider
      summary: List providers
      description: |
        This API lists all database providers in the specified cluster.
      operationId: listProviders
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
      responses:
        '200':
          description: List of providers
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/ProviderList'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/providers/{provider}':
    x-everest-resource-name: providers
    get:
      tags:
        - Provider
      summary: Get provider
      description: |
        This API gets the database provider specified by the `provider` name in the specified `cluster`.
      operationId: getProvider
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: provider
          in: path
          required: true
          description: The name of the provider
          schema:
            type: string
      responses:
        '200':
          description: Provider details
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Provider'
        '404':
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/instances':
    x-everest-resource-name: instances
    get:
      tags:
        - Instance
      summary: List instances
      description: |
        This API lists all database instances in the specified namespace and cluster.
      operationId: listInstances
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where instances are located
          schema:
            type: string
      responses:
        '200':
          description: List of instances
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/InstanceList'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Instance
      summary: Create instance
      description: |
        This API creates a new database instance in the specified namespace and cluster.
      operationId: createInstance
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance will be created
          schema:
            type: string
      requestBody:
        description: The instance object to be created
        required: true
        content:
          application/json:
            schema:
              $ref: 'crds.gen.yaml#/components/schemas/Instance'
      responses:
        '200':
          description: Instance created successfully
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Instance'
        '201':
          description: Instance created successfully
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Instance'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/instances/{instance}':
    x-everest-resource-name: instances
    get:
      tags:
        - Instance
      summary: Get instance
      description: |
        This API gets the database instance specified by the `instance` name in the specified `namespace` and `cluster`.
      operationId: getInstance
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance is located
          schema:
            type: string
        - name: instance
          in: path
          required: true
          description: The name of the instance
          schema:
            type: string
      responses:
        '200':
          description: Instance details
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Instance'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Instance
      summary: Update instance
      description: |
        This API updates the database instance specified by the `instance` name in the specified `namespace` and `cluster`.
      operationId: updateInstance
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance is located
          schema:
            type: string
        - name: instance
          in: path
          required: true
          description: The name of the instance
          schema:
            type: string
      requestBody:
        description: The instance object to be updated
        required: true
        content:
          application/json:
            schema:
              $ref: 'crds.gen.yaml#/components/schemas/Instance'
      responses:
        '200':
          description: Instance updated successfully
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Instance'
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Instance
      summary: Delete instance
      description: |
        This API deletes the database instance specified by the `instance` name in the specified `namespace` and `cluster`.
      operationId: deleteInstance
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance is located
          schema:
            type: string
        - name: instance
          in: path
          required: true
          description: The name of the instance
          schema:
            type: string
        - name: deletionPolicy
          in: query
          required: false
          description: |
            Override the instance's spec.deletionPolicy before deletion.
            "Cascade" (default) deletes all Backup and Restore CRs referencing this instance.
            "Orphan" leaves Backup and Restore CRs in place.
            When omitted, the existing value on the Instance CR is used.
          schema:
            type: string
            enum:
              - Cascade
              - Orphan
      responses:
        '200':
          description: Instance deleted successfully
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Instance'
        '204':
          description: Instance deleted successfully
        '404':
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/instances/{instance}/connection':
    x-everest-resource-name: instances
    get:
      tags:
        - Instance
      summary: Get instance connection details
      description: |
        This API returns the connection details for the database instance specified by the `instance` name
        in the specified `namespace` and `cluster`. The connection details include the host, port, username,
        password, and a pre-built connection URI. These details are populated by the provider once the instance
        is running and ready.
      operationId: getInstanceConnection
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance is located
          schema:
            type: string
        - name: instance
          in: path
          required: true
          description: The name of the instance
          schema:
            type: string
      responses:
        '200':
          description: Connection details for the instance
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/InstanceConnectionDetails'
        '404':
          description: Instance or connection details not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/instances/{instance}/backups':
    x-everest-resource-name: backups
    get:
      tags:
        - Backup
      summary: List backups for an instance
      description: |
        This API lists all backups for the instance specified by the `instance` name
        in the specified `namespace` and `cluster`.
      operationId: listInstanceBackups
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance is located
          schema:
            type: string
        - name: instance
          in: path
          required: true
          description: The name of the instance
          schema:
            type: string
      responses:
        '200':
          description: List of backups for the instance
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/BackupList'
        '400':
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/instances/{instance}/restores':
    x-everest-resource-name: restores
    get:
      tags:
        - Restore
      summary: List restores performed for an instance
      description: |
        This API lists all restores performed for the instance specified by the `instance` name
        in the specified `namespace` and `cluster`.
      operationId: listInstanceRestores
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the instance is located
          schema:
            type: string
        - name: instance
          in: path
          required: true
          description: The name of the instance
          schema:
            type: string
      responses:
        '200':
          description: List of restores for the instance
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/RestoreList'
        '400':
          description: Unsuccessful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/backup-classes':
    x-everest-resource-name: backup-classes
    get:
      tags:
        - Backup
      summary: List backup classes
      description: |
        This API lists all backup classes in the specified cluster.
      operationId: listBackupClasses
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
      responses:
        '200':
          description: List of backup classes
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/BackupClassList'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/backup-classes/{backupClass}':
    x-everest-resource-name: backup-classes
    get:
      tags:
        - Backup
      summary: Get backup class
      description: |
        This API gets the backup class specified by the `backupClass` name in the specified `cluster`.
      operationId: getBackupClass
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: backupClass
          in: path
          required: true
          description: The name of the backup class
          schema:
            type: string
      responses:
        '200':
          description: Backup class details
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/BackupClass'
        '404':
          description: Backup class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/backups':
    x-everest-resource-name: backups
    post:
      tags:
        - Backup
      summary: Create backup
      description: |
        This API creates a new backup in the specified namespace and cluster.
      operationId: createBackup
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the backup will be created
          schema:
            type: string
      requestBody:
        description: The backup object to be created
        required: true
        content:
          application/json:
            schema:
              $ref: 'crds.gen.yaml#/components/schemas/Backup'
      responses:
        '201':
          description: Backup created successfully
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Backup'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/backups/{backup}':
    x-everest-resource-name: backups
    get:
      tags:
        - Backup
      summary: Get backup
      description: |
        This API gets the backup specified by the `backup` name in the specified `namespace` and `cluster`.
      operationId: getBackup
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the backup is located
          schema:
            type: string
        - name: backup
          in: path
          required: true
          description: The name of the backup
          schema:
            type: string
      responses:
        '200':
          description: Backup details
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Backup'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Backup
      summary: Delete backup
      description: |
        This API deletes the backup specified by the `backup` name in the specified `namespace` and `cluster`.
      operationId: deleteBackup
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the backup is located
          schema:
            type: string
        - name: backup
          in: path
          required: true
          description: The name of the backup
          schema:
            type: string
        - name: deletionPolicy
          in: query
          required: false
          description: |
            Override the backup's spec.deletionPolicy before deletion.
            "Delete" (default) removes both the engine backup resource and the data in S3.
            "Retain" removes the engine backup resource but preserves the data in S3.
            When omitted, the existing value on the Backup CR is used.
          schema:
            type: string
            enum:
              - Delete
              - Retain
      responses:
        '200':
          description: Backup deleted successfully
          content:
            application/json:
              schema:
                $ref: 'crds.gen.yaml#/components/schemas/Backup'
        '204':
          description: Backup deleted successfully
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/clusters/{cluster}/namespaces/{namespace}/restores':
    x-everest-resource-name: restores
    post:
      tags:
        - Restore
      summary: Create restore
      description: |
        This API creates a new restore in the specified namespace and cluster.
      operationId: createRestore
      parameters:
        - name: cluster
          in: path
          required: true
          description: The name of the cluster
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          description: The namespace where the restore will be created
          schema:
            type: string
      requestBody:
        description: The restore object to be created
        required: true
        content:
          application/json:
